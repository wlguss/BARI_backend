apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: 260956700310.dkr.ecr.ap-northeast-2.amazonaws.com/product-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - secretRef:
                name: bari-app-secrets
          env:
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx256m"
