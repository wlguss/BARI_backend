# 로컬 개발 환경 설정
# 실행: ./gradlew :services:product-service:bootRun --args='--spring.profiles.active=local'

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  datasource:
    url: jdbc:mariadb://localhost:3306/bari
    username: bari
    password: bari1234

logging:
  level:
    com.bari: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# s3 
cloud:
  aws:
    region: ap-northeast-2
    s3:
      bucket: bari-product-images