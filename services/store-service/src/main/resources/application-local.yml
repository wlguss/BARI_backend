# 로컬 개발 환경 설정
# 실행: ./gradlew :services:store-service:bootRun --args='--spring.profiles.active=local'

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bari}
    username: ${DB_USERNAME:bari}
    password: ${DB_PASSWORD:bari1234}

logging:
  level:
    com.bari: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
