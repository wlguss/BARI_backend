apiVersion: v1
kind: Namespace
metadata:
  name: store-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-service
  namespace: store-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-service
  template:
    metadata:
      labels:
        app: store-service
    spec:
      containers:
        - name: store-service
          image: 260956700310.dkr.ecr.ap-northeast-2.amazonaws.com/store-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - secretRef:
                name: bari-app-secrets      # DB_*, JWT_SECRET 등 민감값
            - configMapRef:
                name: bari-app-config       # SPRING_PROFILES_ACTIVE, JAVA_OPTS, 내부 DNS 주소 등 비민감값
