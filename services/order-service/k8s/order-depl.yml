apiVersion: v1
kind: Namespace
metadata:
  name: order-service

---
apiVersion: apps/v1
kind: Deployment
metadata:   # DNS 주소 자동 생성 -> 'order-service.order-service.svc.cluster.local'
  name: order-service
  namespace: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 260956700310.dkr.ecr.ap-northeast-2.amazonaws.com/order-service:latest
          ports:
            - containerPort: 8086
          envFrom:
            - secretRef:
                name: bari-app-secrets      # DB_*, JWT_SECRET, KAFKA_BOOTSTRAP_SERVERS 등 민감값
            - configMapRef:
                name: bari-app-config       # JAVA_OPTS, Hikari 설정, 내부 DNS 주소 등 비민감값
          env:
            - name: SERVER_PORT
              value: "8086"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 15
