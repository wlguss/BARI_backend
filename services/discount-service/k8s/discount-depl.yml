apiVersion: v1
kind: Namespace
metadata:
  name: discount-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discount-service
  namespace: discount-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discount-service
  template:
    metadata:
      labels:
        app: discount-service
    spec:
      containers:
        - name: discount-service
          image: 260956700310.dkr.ecr.ap-northeast-2.amazonaws.com/discount-service:latest
          ports:
            - containerPort: 8085
          envFrom:
            - secretRef:
                name: bari-app-secrets      # DB_*, JWT_SECRET 등 민감값
            - configMapRef:
                name: bari-app-config       # JAVA_OPTS, Hikari 설정, 내부 DNS 주소 등 비민감값
          env:
            - name: SERVER_PORT
              value: "8085"
