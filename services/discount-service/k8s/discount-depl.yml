apiVersion: v1
kind: Namespace
metadata:
  name: discount-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discount-service
  namespace: discount-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discount-service
  template:
    metadata:
      labels:
        app: discount-service
    spec:
      containers:
        - name: discount-service
          image: 260956700310.dkr.ecr.ap-northeast-2.amazonaws.com/discount-service:latest
          ports:
            - containerPort: 8085
          env:
            - name: SERVER_PORT
              value: "8085"
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx256m"
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "2"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "1"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: bari-app-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: bari-app-secrets
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: bari-app-secrets
                  key: DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bari-app-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bari-app-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bari-app-secrets
                  key: JWT_SECRET
            - name: PRODUCT_SERVICE_HOST
              valueFrom:
                secretKeyRef:
                  name: discount-service-secret
                  key: PRODUCT_SERVICE_HOST
            - name: PRODUCT_SERVICE_PORT
              valueFrom:
                secretKeyRef:
                  name: discount-service-secret
                  key: PRODUCT_SERVICE_PORT
            - name: INVENTORY_SERVICE_HOST
              valueFrom:
                secretKeyRef:
                  name: discount-service-secret
                  key: INVENTORY_SERVICE_HOST
            - name: INVENTORY_SERVICE_PORT
              valueFrom:
                secretKeyRef:
                  name: discount-service-secret
                  key: INVENTORY_SERVICE_PORT
            - name: STORE_SERVICE_HOST
              valueFrom:
                secretKeyRef:
                  name: discount-service-secret
                  key: STORE_SERVICE_HOST
            - name: STORE_SERVICE_PORT
              valueFrom:
                secretKeyRef:
                  name: discount-service-secret
                  key: STORE_SERVICE_PORT
