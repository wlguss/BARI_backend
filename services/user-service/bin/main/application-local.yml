# 로컬 개발 환경 설정
# 실행: ./gradlew :services:user-service:bootRun --args='--spring.profiles.active=local'

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  datasource:
    url: jdbc:mariadb://localhost:3306/bari
    username: bari
    password: bari1234

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: bari-super-secret-key-must-be-at-least-32-chars
  expiration: 3600000
  refresh-expiration: 604800000

logging:
  level:
    com.bari: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
