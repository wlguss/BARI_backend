apiVersion: v1
kind: ConfigMap
metadata:
  name: bari-app-config
  namespace: user-service
data:
  SPRING_PROFILES_ACTIVE: "prod"
  JAVA_OPTS: "-Xms128m -Xmx256m"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "2"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"

  REDIS_HOST: "redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"

  # 클러스터 내부 DNS 주소 (민감정보 아님)
  # 참고: application.yml의 services.store.url이 이 값을 사용하는데
  # 기존 Deployment에는 누락되어 있었음 (기본값 localhost:8082로 폴백되던 상태) — 이번에 함께 보강
  STORE_SERVICE_HOST: "store-service.store-service.svc.cluster.local"
  STORE_SERVICE_PORT: "8082"
