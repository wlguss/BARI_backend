server:
  port: 8081
  shutdown: graceful

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bari}?useUnicode=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:bari}
    password: ${DB_PASSWORD:bari1234}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# 내부 서비스 URL
services:
  store:
    url: http://${STORE_SERVICE_HOST:localhost}:${STORE_SERVICE_PORT:8082}

# JWT 설정 (32자 이상 시크릿 키 필수)
jwt:
  secret: ${JWT_SECRET:bari-super-secret-key-must-be-at-least-32-chars}
  expiration: 3600000         # Access Token 만료: 1시간 (밀리초)
  refresh-expiration: 604800000  # Refresh Token 만료: 7일 (밀리초)

# Actuator 설정
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

# Swagger UI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
