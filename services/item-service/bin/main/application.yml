server:
  port: 8087
  shutdown: graceful

spring:
  application:
    name: item-service

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bari}
    username: ${DB_USERNAME:bari}
    password: ${DB_PASSWORD:bari1234}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

# JWT 설정 — item-service는 JWT를 직접 사용하지 않지만
# libs:security의 JwtTokenProvider(@Component)가 스캔되므로 설정 필요
jwt:
  secret: ${JWT_SECRET:bari-super-secret-key-must-be-at-least-32-chars}

# Actuator 설정
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

# Swagger UI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
