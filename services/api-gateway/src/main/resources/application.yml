server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # user-service 라우팅
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**

        # item-service 라우팅
        - id: item-service
          uri: http://${ITEM_SERVICE_HOST:localhost}:${ITEM_SERVICE_PORT:8087}
          predicates:
            - Path=/api/items/**

        # product-service 라우팅
        - id: product-service
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:${PRODUCT_SERVICE_PORT:8083}
          predicates:
            - Path=/api/products/**,/api/products/images/**

        # inventory-service 라우팅 
        - id: inventory-service
          uri: http://${INVENTORY_SERVICE_HOST:localhost}:${INVENTORY_SERVICE_PORT:8084}
          predicates:
            - Path=/api/store/inventory/**,/api/inventory/images/**

        # discount-service 라우팅 
        - id: discount-service
          uri: http://${DISCOUNT_SERVICE_HOST:localhost}:${DISCOUNT_SERVICE_PORT:8085}
          predicates:
            - Path=/api/store/discounts/**,/api/discount/images/**
            
        # order-service 라우팅
        - id: order-service
          uri: http://${ORDER_SERVICE_HOST:localhost}:${ORDER_SERVICE_PORT:8086}
          predicates:
            - Path=/api/orders/**,/api/store/orders/**

# JWT 시크릿 키 (32자 이상 필수)
jwt:
  secret: ${JWT_SECRET:bari-super-secret-key-must-be-at-least-32-chars}

# Actuator 설정 (헬스체크)
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
