# 로컬 개발 환경 설정
# 실행: ./gradlew :services:api-gateway:bootRun --args='--spring.profiles.active=local'

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/users/**

        - id: item-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/items/**

        - id: store-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/stores/**

        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/**, /api/products/images/**

        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/store/inventory/**

        - id: discount-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/store/discounts/**,/api/discounts/**

        - id: order-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/orders/**, /api/store/orders/**

jwt:
  secret: ${JWT_SECRET:bari-super-secret-key-must-be-at-least-32-chars}

logging:
  level:
    com.bari: DEBUG
    org.springframework.cloud.gateway: DEBUG
