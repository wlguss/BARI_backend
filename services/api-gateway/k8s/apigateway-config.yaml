apiVersion: v1
kind: ConfigMap
metadata:
  name: bari-app-config
  namespace: gateway
data:
  # 각 서비스의 클러스터 내부 DNS 주소 (K8s Service 규칙: <service>.<namespace>.svc.cluster.local)
  # 민감정보가 아니므로 Secret이 아닌 ConfigMap으로 관리
  STORE_SERVICE_HOST: "store-service.store-service.svc.cluster.local"
  STORE_SERVICE_PORT: "8082"
  PRODUCT_SERVICE_HOST: "product-service.product-service.svc.cluster.local"
  PRODUCT_SERVICE_PORT: "8083"
  INVENTORY_SERVICE_HOST: "inventory-service.inventory-service.svc.cluster.local"
  INVENTORY_SERVICE_PORT: "8084"
  USER_SERVICE_HOST: "user-service.user-service.svc.cluster.local"
  USER_SERVICE_PORT: "8081"
  DISCOUNT_SERVICE_HOST: "discount-service.discount-service.svc.cluster.local"
  DISCOUNT_SERVICE_PORT: "8085"
  ORDER_SERVICE_HOST: "order-service.order-service.svc.cluster.local"
  ORDER_SERVICE_PORT: "8086"
