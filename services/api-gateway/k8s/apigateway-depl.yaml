apiVersion: v1
kind: Namespace
metadata:
  name: gateway

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: 260956700310.dkr.ecr.ap-northeast-2.amazonaws.com/api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: bari-app-secrets      # JWT_SECRET 등 민감값
            - configMapRef:
                name: bari-app-config       # 각 서비스 내부 DNS 주소 등 비민감값
