# 로컬 개발 환경 설정
# 실행: ./gradlew :services:api-gateway:bootRun --args='--spring.profiles.active=local'

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/users/**

        - id: item-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/items/**

jwt:
  secret: bari-super-secret-key-must-be-at-least-32-chars

logging:
  level:
    com.bari: DEBUG
    org.springframework.cloud.gateway: DEBUG
