apiVersion: v1
kind: Namespace
metadata:
  name: inventory-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: 260956700310.dkr.ecr.ap-northeast-2.amazonaws.com/inventory-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - secretRef:
                name: bari-app-secrets      # DB_*, JWT_SECRET, KAFKA_BOOTSTRAP_SERVERS 등 민감값
            - configMapRef:
                name: bari-app-config       # JAVA_OPTS, Hikari 설정, 내부 DNS 주소 등 비민감값
          env:
            - name: SERVER_PORT
              value: "8084"
