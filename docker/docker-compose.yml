# ============================================================
# bari-backend 인프라
#
# [최초 실행]
# docker compose -f docker/docker-compose.yml up -d
#
# [DB 스키마/더미데이터 변경 후 완전 초기화]
# docker compose -f docker/docker-compose.yml down -v
# docker compose -f docker/docker-compose.yml up -d
# ※ -v 옵션: 볼륨(DB 데이터 포함)까지 삭제 후 재생성
#
# [컨테이너만 재시작 (데이터 유지)]
# docker compose -f docker/docker-compose.yml restart
# ============================================================

name: bari-backend

services:
  # ===== MariaDB =====
  mariadb:
    image: mariadb:11.4
    container_name: bari-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: bari
      MYSQL_USER: bari
      MYSQL_PASSWORD: bari1234
    ports:
      - "3306:3306"
    volumes:
      - bari-mariadb-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/dummy-data.sql:/docker-entrypoint-initdb.d/02-dummy-data.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis =====
  redis:
    image: redis:7.4-alpine
    container_name: bari-redis
    ports:
      - "6379:6379"
    volumes:
      - bari-redis-data:/data

  # ===== Zookeeper (Kafka용) =====
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: bari-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ===== Kafka =====
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: bari-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"  # 호스트 테스트용
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ===== RabbitMQ =====
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bari-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: bari
      RABBITMQ_DEFAULT_PASS: bari1234

volumes:
  bari-mariadb-data:
  bari-redis-data:
