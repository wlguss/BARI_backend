name: Deploy order-service

on:
  push:
    branches:
      - dev
    paths:
      - 'services/order-service/**'
      - 'libs/**'

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 260956700310.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: order-service
  EKS_CLUSTER_NAME: bari-cluster
  K8S_NAMESPACE: order-service

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 캐시
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. 빌드 (테스트 제외)
      - name: Build bootJar
        run: ./gradlew :services:order-service:bootJar -x test

      # 5. AWS 자격증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 6. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 7. Docker 이미지 빌드 & ECR 푸시
      - name: Build & Push Docker image
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          LATEST=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

          docker build -f services/order-service/Dockerfile -t $IMAGE -t $LATEST .
          docker push $IMAGE
          docker push $LATEST

      # 8. kubeconfig 설정
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      # 9. k8s 배포
      - name: Deploy to EKS
        run: |
          kubectl apply -f services/order-service/k8s/order-secret.yaml
          kubectl apply -f services/order-service/k8s/order-configmap.yaml
          kubectl apply -f services/order-service/k8s/order-service.yaml
          kubectl apply -f services/order-service/k8s/order-depl.yaml

          # 새 이미지로 롤링 업데이트
          kubectl set image deployment/order-service \
            order-service=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            -n ${{ env.K8S_NAMESPACE }}

          # 배포 완료 대기
          kubectl rollout status deployment/order-service \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s
