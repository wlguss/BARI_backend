name: Deploy store-service

on:
  push:
    branches: [dev]
    paths:
      - "services/store-service/**"
      - "libs/**"
      - ".github/workflows/deploy-store-service.yml"
      - ".github/workflows/deploy-service.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-store-service
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: store-service
      namespace: store-service
    secrets: inherit
